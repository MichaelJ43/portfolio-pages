site:
  title: Michael — software portfolio
  intro: >-
    I build cross-platform tools, web surfaces, and automation with a bias toward
    clear UX and reliable delivery. Below are public repositories that show how I
    ship, document, and integrate CI and GitHub Pages.
  links:
    - label: GitHub profile
      url: https://github.com/michaelj43

repos:
  - slug: echo
    title: Echo
    repo: michaelj43/echo
    url: https://github.com/michaelj43/echo
    language: TypeScript
    extra_links:
      - label: echo-web (GitHub Pages)
        url: https://michaelj43.github.io/echo-web/
    summary: >-
      Cross-platform desktop app for exploring HTTP APIs—collections, environments,
      auth, and request/response views—built with Tauri. The echo-web project site
      is the marketing and documentation surface published on GitHub Pages, with
      automated deploys and PR previews for contributor-friendly iteration.

  - slug: card-game
    title: card-game
    repo: michaelj43/card-game
    url: https://github.com/michaelj43/card-game
    language: TypeScript
    extra_links:
      - label: Live app
        url: https://cardgame.michaelj43.dev
    summary: >-
      Browser card game: interactive play, a focused UI, and a path to iterate on
      rules and balance in public. The live app runs on a custom domain so friends
      and reviewers can try builds without cloning the repository.

  - slug: spiffy-trader
    title: spiffy-trader
    repo: michaelj43/spiffy-trader
    url: https://github.com/michaelj43/spiffy-trader
    language: TypeScript
    summary: >-
      Kalshi trading experiments that combine model-assisted signals with
      structured evaluation and clear boundaries between research and production
      concerns. The repository tracks orchestration, API usage, and how results are
      recorded so ideas stay reproducible and reviewable over time.

  - slug: iac-builder
    title: iac-builder
    repo: michaelj43/iac-builder
    url: https://github.com/michaelj43/iac-builder
    language: TypeScript
    extra_links:
      - label: Live app
        url: https://iacbuilder.michaelj43.dev
    summary: >-
      Web app for composing or exploring infrastructure-as-code in a guided way,
      with an emphasis on sensible defaults and fast feedback. A public instance is
      on the custom domain below (still coming online); the repo remains the
      source of truth for how it is built and deployed.

  - slug: local-ai-worker
    title: local-ai-worker
    repo: michaelj43/local-ai-worker
    url: https://github.com/michaelj43/local-ai-worker
    language: Rust
    summary: >-
      Rust worker for local or self-hosted AI workflows, oriented toward
      performance and clear boundaries when talking to model runtimes. It shows
      how I lean on the type system and async tooling in Rust to keep integration
      code small and testable.

  - slug: adaptive-pipe
    title: adaptive-pipe
    repo: michaelj43/adaptive-pipe
    url: https://github.com/michaelj43/adaptive-pipe
    language: Go
    summary: >-
      Go project for adaptive streaming or piping between components, useful for
      composable CLI and service edges. The code favours small interfaces,
      straightforward concurrency, and building blocks that are easy to reason
      about in larger systems.
