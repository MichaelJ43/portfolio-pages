site_technical_aspects:
  - title: Static generation
    description: >-
      A small Crystal generator reads YAML content, renders ECR templates, and
      publishes static HTML that can run on GitHub Pages or a custom domain.
  - title: Shared design assets
    description: >-
      The page consumes versioned tokens, shell styles, and primitives from
      static.michaelj43.dev so multiple projects can share one visual system.
  - title: Auth-aware shell
    description: >-
      The top bar is provided by a shared script that talks to the auth platform
      for sign-in state while keeping this portfolio static.
  - title: Analytics client
    description: >-
      A lightweight analytics script identifies this app and sends page events
      to the shared API platform.
  - title: Routing and delivery
    description: >-
      Public demos, preview builds, and portfolio pages use custom domains,
      static hosting, and GitHub Actions-based deployment.

