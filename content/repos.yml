repos:
  - slug: echo
    title: Echo
    repo: michaelj43/echo
    url: https://github.com/michaelj43/echo
    languages:
      - TypeScript
      - Rust
    skills:
      - Tauri desktop apps
      - API client UX
      - Auth workflows
      - CI/CD and PR previews
    extra_links:
      - label: echo-web (GitHub Pages)
        url: https://michaelj43.github.io/echo-web/
    summary: >-
      Cross-platform desktop app for exploring HTTP APIs—collections, environments,
      auth, and request/response views—built with Tauri. The echo-web project site
      is the marketing and documentation surface published on GitHub Pages, with
      automated deploys and PR previews for contributor-friendly iteration.

  - slug: card-game
    title: card-game
    repo: michaelj43/card-game
    url: https://github.com/michaelj43/card-game
    languages:
      - TypeScript
      - HCL
    skills:
      - React + TypeScript UI
      - Multiplayer REST + WebSocket APIs (AWS)
      - WebRTC data channel + signaling
      - DynamoDB + Lambda room services
      - Terraform + custom domain hosting
    extra_links:
      - label: Live app
        url: https://cardgame.michaelj43.dev
    summary: >-
      Browser card table with many YAML-driven games, AI seats, and online play.
      An AWS multiplayer stack handles rooms, JWT-gated signaling over WebSocket,
      and optional TURN scheduling; peers sync authoritative table state over
      WebRTC while Terraform defines the infrastructure. The live app is on a
      custom domain so friends and reviewers can try builds without cloning.

  - slug: spiffy-trader
    title: spiffy-trader
    repo: michaelj43/spiffy-trader
    url: https://github.com/michaelj43/spiffy-trader
    languages:
      - TypeScript
    skills:
      - External API integration
      - Model-assisted evaluation
      - Automation
      - Reproducible workflows
    summary: >-
      Kalshi trading experiments that combine model-assisted signals with
      structured evaluation and clear boundaries between research and production
      concerns. The repository tracks orchestration, API usage, and how results are
      recorded so ideas stay reproducible and reviewable over time.

  - slug: iac-builder
    title: iac-builder
    repo: michaelj43/iac-builder
    url: https://github.com/michaelj43/iac-builder
    languages:
      - Go
      - TypeScript
    skills:
      - React + Vite wizard UI
      - Optional OpenAI BYOK assist (auditable prompts)
      - Optional encrypted AWS profiles + VPC/subnet discovery
      - Terraform-style generation + code preview drawer
      - Go API with SQLite and preview pipeline
      - Docker Compose; AWS serverless hosting (GitHub Actions)
    extra_links:
      - label: Live app
        url: https://iacbuilder.michaelj43.dev
    summary: >-
      Guided Infrastructure-as-Code generator: a React wizard fronts a Go API
      that produces previewable Terraform-style output in a code drawer, with
      sensible defaults, optional encrypted AWS credential profiles for discovery,
      and optional OpenAI BYOK suggestions under operator-controlled guardrails.
      Local runs use Docker Compose; production paths cover S3, CloudFront, and
      Lambda with documented Terraform and CI deploy/destroy workflows.

